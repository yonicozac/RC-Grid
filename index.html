<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Event Signup App</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; }
    .event { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
    .admin-panel { border: 2px solid #444; padding: 15px; margin-bottom: 30px; }
    button { margin: 5px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h1>Event Signup</h1>

<button id="loginBtn">Login</button>
<button id="logoutBtn" class="hidden">Logout</button>

<div id="adminPanel" class="admin-panel hidden">
  <h2>Create Event (Admin)</h2>
  <input id="eventName" placeholder="Event name"><br>
  <input id="eventDate" type="date"><br>
  <input id="eventCategories" placeholder="Categories (comma separated)"><br>
  <button id="createEventBtn">Create Event</button>
</div>

<h2>Available Events</h2>
<div id="eventsContainer"></div>

<script type="module" src="app.js"></script>
</body>
</html>
